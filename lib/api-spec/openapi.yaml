  /reports/profit-analysis:
    get:
      operationId: getProfitAnalysis
      tags: [reports]
      summary: Get HPP and profit analysis for all products
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profit analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfitAnalysisItem"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [users]
      summary: Get dashboard overview stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

